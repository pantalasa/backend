name: CI

on:
  push:
    branches: [ main, master, localdev-dchw-main ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: lunar
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Run tests
      run: go test -v ./...
    
    - name: Install Snyk CLI
      run: npm install -g snyk
    
    - name: Snyk security scan
      run: snyk test --all-projects
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    - name: Log in to Docker Hub
      if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      run: |
        IMAGE="pantalasabot/pantalasa"
        SHA_TAG="pantalasa-backend-${{ github.sha }}"
        BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        docker build \
          --label git_sha=${{ github.sha }} \
          --label build_date=${BUILD_DATE} \
          --label version=${{ github.ref_name }} \
          --label repository=${IMAGE} \
          -t ${IMAGE}:${SHA_TAG} \
          .

        if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == refs/tags/v* ]]; then
          docker push ${IMAGE}:${SHA_TAG}
          echo "Pushed ${IMAGE}:${SHA_TAG}"
        fi

        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VERSION="${{ github.ref_name }}"
          VERSION_TAG="pantalasa-backend-${VERSION#v}"
          docker tag ${IMAGE}:${SHA_TAG} ${IMAGE}:${VERSION_TAG}
          docker push ${IMAGE}:${VERSION_TAG}
          echo "Pushed ${IMAGE}:${VERSION_TAG}"
        fi

  sbom:
    runs-on: lunar
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM
        run: |
          syft dir:. -o cyclonedx-json=sbom.cyclonedx.json
          echo "SBOM generated:"
          cat sbom.cyclonedx.json | head -50
